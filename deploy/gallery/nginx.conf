# ==========================================
# Gallery Project Nginx Configuration
# Generated by Trae AI for automated deployment
# ==========================================

server {
    listen 80;
    server_name localhost;

    # Serve static files from the build output directory
    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression for faster loading times
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA Routing: Redirect all 404 requests to index.html
    # This allows React Router to handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (images, fonts, scripts, styles) for 1 year
    # These files usually have hash names, so long caching is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Custom error pages (optional)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
