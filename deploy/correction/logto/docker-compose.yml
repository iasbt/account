version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ${LOGTO_DB_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${LOGTO_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - logto_net

  logto:
    image: ghcr.io/logto-io/logto:latest
    container_name: ${LOGTO_CONTAINER_NAME}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TRUST_PROXY_HEADER: '1'
      ENDPOINT: ${LOGTO_BASE_URL} # Logto 对外 API 基础地址（等价 BASE_URL）
      ADMIN_ENDPOINT: ${LOGTO_ADMIN_URL} # Logto 管理控制台地址
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_STATEMENT_TIMEOUT: DISABLE_TIMEOUT
      LOGTO_ENCRYPTION_KEY: ${LOGTO_ENCRYPTION_KEY}
    ports:
      - '127.0.0.1:${LOGTO_PORT}:3001' # 核心服务仅绑定本机，避免与账户项目公网入口冲突
      - '127.0.0.1:${LOGTO_ADMIN_PORT}:3002' # 管理控制台仅绑定本机，通过反向代理访问
    networks:
      - logto_net

networks:
  logto_net:
    name: ${DOCKER_NETWORK}
    driver: bridge
