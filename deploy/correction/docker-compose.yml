version: '3.8'

services:
  # Backend Service (Node.js)
  account-backend:
    build:
      context: ../..
      dockerfile: deploy/correction/Dockerfile.api
    container_name: account-backend
    restart: always
    environment:
      # Connect to the EXISTING TRUE DATABASE (iasbt-postgres)
      # Using hostname 'iasbt-postgres' requires it to be in the same network
      - DB_HOST=iasbt-postgres
      - DB_PORT=5432
      # Please ensure these are set in your .env file
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=postgres
      - SSO_JWT_SECRET=${SSO_JWT_SECRET}
      - CORS_ALLOWLIST=${CORS_ALLOWLIST}
      - PORT=3000
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    networks:
      - correction_default
    ports:
      - "3000:3000"
    volumes:
      - ./certs:/app/certs

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - correction_default

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8888:80"
    entrypoint: /bin/sh -c "cp /pgadmin4/servers.json /var/lib/pgadmin/servers.json; chown -R pgadmin:pgadmin /var/lib/pgadmin; chmod 600 /var/lib/pgadmin/servers.json; /entrypoint.sh"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - /home/ubuntu/account/deploy/correction/servers.json:/pgadmin4/servers.json
    networks:
      - correction_default

  # Frontend Service (Nginx + React Static)
  account-frontend:
    build:
      context: ../..
      dockerfile: deploy/correction/Dockerfile.web
    container_name: account-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mount the custom nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - account-backend
    networks:
      - correction_default
      - logto-isolated

networks:
  correction_default:
    external: true
  logto-isolated:
    external: true

volumes:
  redis_data:
  pgadmin_data:
