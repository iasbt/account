server {
    listen 80;
    server_name www.iasbt.cloud;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

}

# --- 临时绕过备案访问 (IP Access) ---
server {
    listen 80 default_server;
    server_name _;
    
    # 允许 IP 访问前端
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

}
