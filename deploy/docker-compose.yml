version: '3.8'

services:
  # --- 业务数据库 (原 Supabase 数据迁移目标) ---
  postgres:
    image: postgres:15
    container_name: postgres-business
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD}
      POSTGRES_DB: supabase_backup
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - iasbt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PostgREST (Supabase API 替代品) ---
  postgrest:
    image: postgrest/postgrest:latest
    container_name: postgrest
    restart: always
    environment:
      PGRST_DB_URI: postgres://postgres:${DB_ROOT_PASSWORD}@postgres:5432/supabase_backup
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_OPENAPI_SERVER_PROXY_URI: http://119.91.71.30/api/rest
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iasbt-net

  # --- 统一网关 (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "80:80"
      - "8080:80" # 临时端口，绕过备案拦截
      - "443:443"
    volumes:
      - ./data/nginx/conf.d:/etc/nginx/conf.d
      - ./data/nginx/certs:/etc/nginx/certs
      - ./data/nginx/html:/usr/share/nginx/html
    depends_on:
      - postgrest
    networks:
      - iasbt-net

networks:
  iasbt-net:
    driver: bridge
