version: '3.8'

services:
  # --- 核心数据库 (Casdoor / Auth) ---
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: casdoor
    volumes:
      # 数据持久化
      - ./data/mysql:/var/lib/mysql
      # 初始化脚本
      - ./data/init-sql:/docker-entrypoint-initdb.d
    networks:
      - iasbt-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 业务数据库 (原 Supabase 数据迁移目标) ---
  postgres:
    image: postgres:15
    container_name: postgres-business
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD}
      POSTGRES_DB: supabase_backup
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432" # 暴露端口以便迁移数据，生产环境建议关闭或限制 IP
    networks:
      - iasbt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 认证中心 (Casdoor) ---
  casdoor:
    image: casbin/casdoor:latest
    container_name: casdoor
    restart: always
    environment:
      driverName: mysql
      dataSourceName: root:${DB_ROOT_PASSWORD}@tcp(mysql:3306)/
      dbName: casdoor
      # 强制使用外部域名，避免跳转错误
      # origin: https://account.iasbt.cloud # 暂时注释以允许 IP 访问调试
    volumes:
      - ./data/casdoor/conf:/conf
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - iasbt-net

  # --- 相册服务 (MT Photos / PhotoPrism) ---
  # 这里以 MT Photos 为例，更轻量，适合 4G 内存
  mt-photos:
    image: mtphotos/mt-photos:latest
    container_name: mt-photos
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/gallery/config:/config
      - ./data/gallery/upload:/upload
    networks:
      - iasbt-net

  # --- 统一网关 (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    restart: always
    ports:
      - "80:80"
      - "8080:80" # 临时端口，绕过备案拦截
      - "443:443"
    volumes:
      - ./data/nginx/conf.d:/etc/nginx/conf.d
      - ./data/nginx/certs:/etc/nginx/certs
      - ./data/nginx/html:/usr/share/nginx/html
    depends_on:
      - casdoor
      - mt-photos
    networks:
      - iasbt-net

networks:
  iasbt-net:
    driver: bridge
