<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数据验收面板</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        color: #0f172a;
        background: #f8fafc;
      }
      h1 {
        margin-bottom: 8px;
      }
      .card {
        background: #ffffff;
        border-radius: 12px;
        padding: 16px 20px;
        margin: 12px 0;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      }
      .muted {
        color: #64748b;
        font-size: 14px;
      }
      ul {
        padding-left: 18px;
      }
      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h1>Supabase 数据验收</h1>
    <div class="muted">展示 gallery.images 与 legacy_users 的恢复情况</div>

    <div class="card">
      <h2>照片统计</h2>
      <div id="totalImages">加载中...</div>
    </div>

    <div class="card">
      <h2>最新 5 张照片</h2>
      <ul id="latestImages"></ul>
    </div>

    <div class="card">
      <h2>用户核对</h2>
      <div id="userCheck">加载中...</div>
    </div>

    <script>
      async function loadDashboard() {
        const response = await fetch("/api/dashboard/stats");
        const data = await response.json();

        const totalImages = document.getElementById("totalImages");
        totalImages.textContent = `总照片数：${data.totalImages}`;

        const latestImages = document.getElementById("latestImages");
        latestImages.innerHTML = "";
        if (data.latestImages && data.latestImages.length > 0) {
          data.latestImages.forEach((item) => {
            const li = document.createElement("li");
            li.innerHTML = `<strong>${item.title || "(无标题)"}</strong> — <code>${item.file_path}</code>`;
            latestImages.appendChild(li);
          });
        } else {
          latestImages.innerHTML = "<li>暂无图片数据</li>";
        }

        const userCheck = document.getElementById("userCheck");
        if (data.user) {
          userCheck.innerHTML = `邮箱：<code>${data.user.email}</code>，用户名：<code>${data.user.username || "-"}</code>`;
        } else {
          userCheck.textContent = "未找到 iasbt@outlook.com";
        }
      }

      loadDashboard().catch((error) => {
        document.getElementById("totalImages").textContent = "加载失败";
        document.getElementById("userCheck").textContent = "加载失败";
        console.error(error);
      });
    </script>
  </body>
</html>
