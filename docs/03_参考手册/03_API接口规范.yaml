openapi: 3.0.0
info:
  title: Image Gallery API
  version: 1.0.0
  description: API for Image Gallery Application
servers:
  - url: https://api.iasbt.cloud/api/rest
    description: Production Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /images:
    get:
      summary: Get user images
      parameters:
        - in: query
          name: category_id
          schema:
            type: integer
          description: Filter by category ID
      responses:
        '200':
          description: List of images
    post:
      summary: Upload an image
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                category_id:
                  type: integer
      responses:
        '201':
          description: Image created
  /categories:
    get:
      summary: Get user categories
      responses:
        '200':
          description: List of categories
    post:
      summary: Create a category
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
      responses:
        '201':
          description: Category created
  /user/preferences:
    get:
      summary: Get user preferences
      responses:
        '200':
          description: User preferences
    patch:
      summary: Update user preferences
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hasAcceptedTerms:
                  type: boolean
                hasSeenOnboarding:
                  type: boolean
                categoryOrder:
                  type: array
                  items:
                    type: integer
                hiddenCategoryIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Preferences updated
  /user/profile:
    patch:
      summary: Update user profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                avatar_url:
                  type: string
      responses:
        '200':
          description: Profile updated
  /user/apikeys:
    get:
      summary: Get API keys
      responses:
        '200':
          description: List of API keys
    post:
      summary: Create API key
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '201':
          description: API key created
  /user/apikeys/{id}:
    delete:
      summary: Delete API key
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key deleted
